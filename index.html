<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taha Chabat - Cyber Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Poppins, sans-serif;
  background:black;
  color:white;
  overflow:hidden;
}

/* MATRIX */
#matrix{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* MAIN */
.container{
  max-width:750px;
  margin:60px auto;
  padding:30px;
  background:rgba(255,0,0,0.05);
  border:1px solid rgba(255,0,0,0.25);
  border-radius:15px;
  text-align:center;
  backdrop-filter:blur(10px);
  box-shadow:0 0 25px rgba(255,0,0,0.2);
}

/* TITLE */
.glitch{
  font-size:3rem;
  color:#ff2b2b;
  text-shadow:0 0 10px red;
  animation:flicker 2s infinite;
}

@keyframes flicker{
  0%,100%{opacity:1;}
  50%{opacity:0.6;}
}

p{
  margin:10px 0;
  color:#ddd;
}

.highlight{
  color:#ff4d4d;
  font-weight:bold;
}

/* BUTTONS */
.links{
  display:flex;
  gap:10px;
  margin-top:20px;
  justify-content:center;
}

.links a{
  flex:1;
  padding:12px;
  text-decoration:none;
  color:white;
  border-radius:10px;
  background:rgba(255,0,0,0.15);
  border:1px solid rgba(255,0,0,0.4);
  transition:0.3s;
}

.links a:hover{
  background:rgba(255,0,0,0.35);
  transform:translateY(-3px);
}

/* PROJECTS */
.projects{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:10px;
}

.project{
  padding:15px;
  border-radius:10px;
  background:rgba(255,0,0,0.08);
  border:1px solid rgba(255,0,0,0.3);
}

/* TERMINAL */
.terminal{
  margin-top:20px;
  height:120px;
  background:black;
  border:1px solid red;
  padding:10px;
  text-align:left;
  font-family:monospace;
  color:#ff4d4d;
  overflow:hidden;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<h1 class="glitch">Taha Chabat</h1>

<p>17-year-old developer passionate about AI & Cyber Security</p>
<p><span class="highlight">Morocco | Ethical Hacking | Programming</span></p>

<div class="links">
  <a href="https://github.com/">GitHub</a>
  <a href="https://instagram.com/">Instagram</a>
</div>

<div class="projects">
  <div class="project">🔐 Password Generator</div>
  <div class="project">🌐 Network Scanner</div>
  <div class="project">🧠 AI Tool</div>
</div>

<div class="terminal" id="terminal"></div>

</div>

<script>

/* MATRIX FIXED */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.height = window.innerHeight;
  canvas.width = window.innerWidth;
}
resize();

let letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%&*".split("");
const fontSize = 14;
const columns = () => canvas.width / fontSize;
const drops = [];

function initDrops(){
  for(let i=0;i<columns();i++){
    drops[i]=1;
  }
}
initDrops();

function draw(){
  ctx.fillStyle="rgba(0,0,0,0.08)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="#ff2b2b";
  ctx.font=fontSize+"px monospace";

  for(let i=0;i<drops.length;i++){
    let text=letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text,i*fontSize,drops[i]*fontSize);

    if(drops[i]*fontSize>canvas.height && Math.random()>0.975){
      drops[i]=0;
    }

    drops[i]++;
  }
}

setInterval(draw,33);

window.addEventListener("resize",()=>{
  resize();
  initDrops();
});

/* TERMINAL */
const terminal=document.getElementById("terminal");

const lines=[
"Booting system...",
"Loading modules...",
"Scanning network...",
"Access granted ✔",
"Hacker mode activated 🔴"
];

let i=0;

function type(){
  if(i<lines.length){
    terminal.innerHTML+="> "+lines[i]+"<br>";
    i++;
    setTimeout(type,700);
  }
}

type();

</script>

</body>
</html>
