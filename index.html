<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Taha Chabat - Cyber Portfolio</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: black;
      color: white;
      overflow-x: hidden;
    }

    /* MATRIX BACKGROUND */
    #matrix {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }

    .container {
      max-width: 750px;
      margin: 80px auto;
      padding: 30px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 0, 0, 0.3);
      border-radius: 15px;
      backdrop-filter: blur(10px);
      text-align: center;
      box-shadow: 0 0 25px rgba(255, 0, 0, 0.2);
    }

    .glitch {
      font-size: 2.8rem;
      color: #ff2b2b;
      text-shadow: 0 0 10px rgba(255,0,0,0.5);
      animation: flicker 2s infinite;
    }

    @keyframes flicker {
      0%,100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    p {
      margin: 15px 0;
      color: #ddd;
      line-height: 1.6;
    }

    .highlight {
      color: #ff4d4d;
      font-weight: bold;
    }

    /* IMAGE */
    .hero-img {
      width: 100%;
      max-width: 520px;
      margin-top: 15px;
      border-radius: 12px;
      border: 1px solid rgba(255,0,0,0.4);
      box-shadow: 0 0 20px rgba(255,0,0,0.25);
    }

    /* LINKS */
    .links {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 20px;
    }

    .links a {
      flex: 1;
      padding: 10px;
      background: rgba(255,0,0,0.15);
      border: 1px solid rgba(255,0,0,0.4);
      border-radius: 8px;
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }

    .links a:hover {
      background: rgba(255,0,0,0.35);
      transform: scale(1.05);
    }
  </style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

  <h1 class="glitch">Taha Chabat</h1>

  <p>
    I'm a <span class="highlight">17-year-old developer</span> passionate about AI, cybersecurity and ethical hacking.
  </p>

  <p>🌍 Morocco | 🧠 AI & Cyber Security Enthusiast</p>

  <!-- 🔥 NEW IMAGE -->
  <img class="hero-img"
       src="https://images.openai.com/static-rsc-4/Gk5dYY-psmqO8IV5QSzY7fHOJPDHrmcd7hNQ6D-b_OH268-28C5P78XEm2dF561Bbb5qdgO-vgIk8JO6Y6ulWDtXWgqEMZH5cfCo0qgTOqPCaVW46DMGUN2jkjRF-c50j7iZSoXSao4oKziwpJER2PVLfRUT_tCWk5ocdsYhF6dCr2nlc7iphplpIdxYhRnU?purpose=inline"
       alt="Cyber hacking">

  <div class="links">
    <a href="https://github.com/tahachabat">GitHub</a>
    <a href="https://instagram.com/taha_chabat">Instagram</a>
  </div>

</div>

<script>
/* MATRIX EFFECT */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%&*".split("");
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(1);

function draw() {
  ctx.fillStyle = "rgba(0,0,0,0.08)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#ff2b2b";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    const text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
      drops[i] = 0;
    }

    drops[i]++;
  }
}

setInterval(draw, 33);

window.addEventListener("resize", () => location.reload());
</script>

</body>
</html>
