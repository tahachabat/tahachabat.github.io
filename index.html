<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taha Chabat - Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1a0000, #3b0a0a, #5a1414);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: rgba(255, 255, 255, 0.06);
      padding: 40px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      max-width: 620px;
      text-align: center;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 0, 0, 0.2);
    }

    h1 {
      font-size: 2.6rem;
      margin-bottom: 10px;
      color: #ff2b2b;
      text-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
    }

    p {
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 20px;
      color: #eaeaea;
    }

    .highlight {
      color: #ff6666;
      font-weight: 600;
    }

    .links {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 10px;
    }

    .links a {
      flex: 1;
      padding: 12px 18px;
      background: rgba(255, 0, 0, 0.12);
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      border: 1px solid rgba(255, 0, 0, 0.35);
      transition: 0.3s ease;
      text-align: center;
    }

    .links a:hover {
      background: rgba(255, 0, 0, 0.25);
      box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
      transform: translateY(-2px);
    }

    img {
      width: 100%;
      max-width: 500px;
      border-radius: 12px;
      margin-bottom: 20px;
      border: 1px solid rgba(255, 0, 0, 0.3);
    }

    @media (max-width: 600px) {
      .container {
        padding: 20px;
      }

      .links {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Taha Chabat</h1>

    <p>
      I'm a <span class="highlight">17-year-old programmer</span> passionate about AI, deep learning, and ethical hacking.
      I build intelligent systems and explore cybersecurity.
    </p>

    <p>🌍 Based in Morocco | 💡 Focused on innovation and knowledge sharing</p>

    <img src="https://www.cybersecurityeducationguides.org/wp-content/uploads/2017/11/advanced-hacking.jpg" alt="Hacking Image">

    <div class="links">
      <a href="https://github.com/tahachabat" target="_blank">GitHub</a>
      <a href="https://www.instagram.com/taha_chabat" target="_blank">Instagram</a>
    </div>
  </div>
</body>
</html>
