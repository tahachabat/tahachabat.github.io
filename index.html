<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Taha Chabat - Cyber Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  background: black;
  color: white;
  overflow-x: hidden;
}

/* MATRIX */
#matrix {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

/* MAIN CARD */
.container {
  max-width: 800px;
  margin: 60px auto;
  padding: 30px;
  background: rgba(255,0,0,0.05);
  border: 1px solid rgba(255,0,0,0.25);
  border-radius: 16px;
  backdrop-filter: blur(12px);
  box-shadow: 0 0 30px rgba(255,0,0,0.15);
  text-align: center;
}

/* GLITCH TITLE */
.glitch {
  font-size: 3rem;
  color: #ff2b2b;
  text-shadow: 0 0 10px red, 0 0 20px darkred;
  animation: flicker 2s infinite;
}

@keyframes flicker {
  0%,100% {opacity:1;}
  50% {opacity:0.6;}
}

p {
  margin: 10px 0;
  color: #ddd;
  line-height: 1.6;
}

.highlight {
  color: #ff4d4d;
  font-weight: bold;
}

/* BUTTONS */
.links {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-top: 20px;
}

.links a {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  text-decoration: none;
  color: white;
  background: rgba(255,0,0,0.12);
  border: 1px solid rgba(255,0,0,0.4);
  transition: 0.3s;
}

.links a:hover {
  transform: translateY(-3px);
  background: rgba(255,0,0,0.3);
  box-shadow: 0 0 15px red;
}

/* PROJECTS */
.projects {
  margin-top: 25px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px;
}

.project {
  padding: 15px;
  border-radius: 10px;
  background: rgba(255,0,0,0.08);
  border: 1px solid rgba(255,0,0,0.3);
  transition: 0.3s;
}

.project:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px red;
}

/* TERMINAL */
.terminal {
  margin-top: 25px;
  background: black;
  border: 1px solid red;
  padding: 15px;
  font-family: monospace;
  color: #ff4d4d;
  height: 140px;
  text-align: left;
  overflow: hidden;
  box-shadow: 0 0 15px rgba(255,0,0,0.2);
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<h1 class="glitch">Taha Chabat</h1>

<p>I'm a <span class="highlight">17-year-old developer</span> focused on AI, cybersecurity & ethical hacking.</p>
<p>🌍 Morocco | 🧠 AI • Cyber Security • Programming</p>

<!-- BUTTONS -->
<div class="links">
  <a href="https://github.com/tahachabat">GitHub</a>
  <a href="https://instagram.com/taha_chabat">Instagram</a>
</div>

<!-- PROJECTS -->
<div class="projects">
  <div class="project">🔐 Password Generator</div>
  <div class="project">🌐 Network Scanner (Python)</div>
  <div class="project">🧠 AI Image Enhancer</div>
</div>

<!-- TERMINAL -->
<div class="terminal" id="terminal"></div>

</div>

<script>

/* MATRIX EFFECT */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%&*".split("");
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(1);

function draw() {
  ctx.fillStyle = "rgba(0,0,0,0.08)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#ff2b2b";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    const text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text, i*fontSize, drops[i]*fontSize);

    if (drops[i]*fontSize > canvas.height && Math.random()>0.975) {
      drops[i]=0;
    }
    drops[i]++;
  }
}

setInterval(draw,33);

/* TERMINAL TYPE EFFECT */
const terminal = document.getElementById("terminal");

const lines = [
"Booting system...",
"Loading AI modules...",
"Initializing cyber tools...",
"Scanning network...",
"Access granted ✔",
"Welcome to hacker mode 🔴"
];

let i = 0;

function type() {
  if(i < lines.length){
    terminal.innerHTML += "> " + lines[i] + "<br>";
    i++;
    setTimeout(type, 700);
  }
}

type();

window.addEventListener("resize",()=>location.reload());

</script>

</body>
</html>
