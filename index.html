<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Taha Chabat - Cyber Portfolio</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      color: white;
      overflow-x: hidden;
      background: black;
    }

    /* MATRIX BACKGROUND */
    #matrix {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }

    /* MAIN CONTAINER */
    .container {
      max-width: 750px;
      margin: auto;
      margin-top: 80px;
      padding: 30px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 0, 0, 0.3);
      border-radius: 15px;
      backdrop-filter: blur(10px);
      text-align: center;
      box-shadow: 0 0 25px rgba(255, 0, 0, 0.2);
    }

    /* GLITCH TITLE */
    .glitch {
      font-size: 2.8rem;
      font-weight: bold;
      color: #ff2b2b;
      position: relative;
      text-shadow: 0 0 10px rgba(255,0,0,0.5);
      animation: flicker 2s infinite;
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    p {
      margin: 15px 0;
      line-height: 1.6;
      color: #ddd;
    }

    .highlight {
      color: #ff4d4d;
      font-weight: bold;
    }

    /* PROJECT CARDS */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .card {
      background: rgba(255, 0, 0, 0.08);
      border: 1px solid rgba(255, 0, 0, 0.3);
      padding: 15px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
    }

    /* BUTTONS */
    .links {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .links a {
      flex: 1;
      padding: 10px;
      text-decoration: none;
      color: white;
      background: rgba(255,0,0,0.15);
      border: 1px solid rgba(255,0,0,0.4);
      border-radius: 8px;
      transition: 0.3s;
    }

    .links a:hover {
      background: rgba(255,0,0,0.35);
      transform: scale(1.05);
    }

    /* TERMINAL STYLE */
    .terminal {
      margin-top: 20px;
      text-align: left;
      background: black;
      border: 1px solid red;
      padding: 10px;
      font-family: monospace;
      color: #ff4d4d;
      height: 120px;
      overflow: hidden;
    }
  </style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

  <h1 class="glitch">Taha Chabat</h1>

  <p>
    I'm a <span class="highlight">17-year-old developer</span> passionate about AI, cybersecurity and ethical hacking.
  </p>

  <p>🌍 Morocco | 🧠 AI & Cyber Security Enthusiast</p>

  <img src="https://www.cybersecurityeducationguides.org/wp-content/uploads/2017/11/advanced-hacking.jpg"
       style="width:100%; border-radius:10px; margin-top:10px; border:1px solid red;">

  <!-- PROJECTS -->
  <div class="cards">
    <div class="card">🔐 Password Generator Tool</div>
    <div class="card">🧠 AI Image Enhancer</div>
    <div class="card">🌐 Network Scanner (Python)</div>
  </div>

  <!-- LINKS -->
  <div class="links">
    <a href="https://github.com/tahachabat">GitHub</a>
    <a href="https://instagram.com/taha_chabat">Instagram</a>
  </div>

  <!-- TERMINAL -->
  <div class="terminal" id="terminal"></div>

</div>

<script>
/* MATRIX EFFECT */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

let letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%&*";
letters = letters.split("");

const fontSize = 14;
const columns = canvas.width / fontSize;

const drops = Array(Math.floor(columns)).fill(1);

function draw() {
  ctx.fillStyle = "rgba(0, 0, 0, 0.08)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#ff2b2b";
  ctx.font = fontSize + "px monospace";

  for (let i = 0; i < drops.length; i++) {
    const text = letters[Math.floor(Math.random() * letters.length)];
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975)
      drops[i] = 0;

    drops[i]++;
  }
}

setInterval(draw, 33);

window.addEventListener("resize", () => location.reload());

/* TERMINAL TYPING */
const terminal = document.getElementById("terminal");

const lines = [
  "Initializing system...",
  "Loading cyber modules...",
  "Connecting to secure server...",
  "Access granted ✔",
  "Welcome hacker mode activated 🔴"
];

let i = 0;

function typeLine() {
  if (i < lines.length) {
    terminal.innerHTML += lines[i] + "<br>";
    i++;
    setTimeout(typeLine, 800);
  }
}

typeLine();
</script>

</body>
</html>
